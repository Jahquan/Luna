name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout Git Repo
      uses: actions/checkout@v5

    - name: Install zlib headers
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y zlib1g-dev

    - name: Build
      run: |
        make

    - name: Test
      run: |
        make test

  sanitize:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Git Repo
      uses: actions/checkout@v5

    - name: Install build deps
      run: |
        sudo apt-get update
        sudo apt-get install -y zlib1g-dev clang

    - name: Sanitizer build
      run: |
        ASAN_OPTIONS=detect_leaks=0 make sanitize
